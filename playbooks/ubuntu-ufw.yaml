---
- hosts: ubuntu
  become: true

  tasks:

  - name: Reset UFW
    community.general.ufw:
      state: reset

  - name: Allow outgoing traffic
    community.general.ufw:
      policy: allow
      direction: outgoing

  - name: Deny incoming traffic
    community.general.ufw:
      policy: deny
      direction: incoming

  - name: Allow SSH
    community.general.ufw:
      name: OpenSSH
      rule: allow

  - name: Enable firewall
    community.general.ufw:
      state: enabled
