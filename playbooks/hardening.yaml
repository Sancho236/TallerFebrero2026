---
- hosts: linux
  become: true

  tasks:

  - name: Update all installed packages CentOS
    ansible.builtin.dnf:
      name: "*"
      state: latest
    notify: Reboot servers
    when: ansible_os_family == "RedHat"

  - name: Update all installed packages in Ubuntu
    ansible.builtin.apt:
      name: "*"
      state: latest
      update_cache: true
    notify: Reboot servers
    when: ansible_os_family == "Debian"

  handlers:

  - name: Reboot servers
    ansible.builtin.reboot:
