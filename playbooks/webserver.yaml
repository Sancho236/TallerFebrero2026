---
- hosts: ubuntu
  become: true

  tasks:

  - name: Copiar archivo del servidor web
    ansible.builtin.copy:
      src: ../files/shared-http.service
      dest: /etc/systemd/system/shared-http.service
      owner: root
      group: root
      mode: '0644'
    notify: Reiniciar servicio http

  - name: Iniciar servicio http
    ansible.builtin.systemd_service:
      name: shared-http
      state: started
      daemon-reload: true
      enabled: true

  - name: Abrir puerto
    community.general.ufw:
      rule: allow
      port: '8080'
      proto: tcp

  handlers:

  - name: Reiniciar servicio http
    ansible.builtin.systemd_service:
      name: shared-http
      state: restarted
      daemon-reload: true
      enabled: true
