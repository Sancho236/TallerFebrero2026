---
- hosts: fileserver
  become: true

  tasks:

  - name: Instalar servidor nfs
    ansible.builtin.dnf:
      name: nfs-utils
      state: present


  - name: Crear directorio shared
    ansible.builtin.file:
      path: /srv/nfs/shared
      state: directory
      owner: nobody
      mode: '0777'


  - name: Exportar directorio shared
    ansible.builtin.lineinfile:
      path: /etc/exports
      line: '/srv/nfs/shared    192.168.10.0/24(rw)'
      state: present

  - name: Iniciar servicio nfs
    ansible.builtin.systemd_service:
      name: nfs-server
      state: started
      enabled: true

  - name: Habilitar nfs en firewalld
    ansible.posix.firewalld:
      service: nfs
      state: enabled
      permanent: true
      immediate: true

  - name: Copiar archivo de prueba al servidor
    ansible.builtin.template:
      src: ../templates/README-NFS.j2
      dest: /srv/nfs/shared/README-NFS.txt
      owner: nobody
      mode: u=r,g=r,o=r

