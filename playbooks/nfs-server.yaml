---
- hosts: fileserver
  become: true

  tasks:

  - name: Install nfs server
    ansible.builtin.dnf:
      name: nfs-utils


  - name: Create shared directory
    ansible.builtin.file:
      path: /srv/nfs/shared
      state: directory
      owner: nobody
      mode: '0777'


  - name: Export shared directory
    ansible.builtin.lineinfile:
      path: /etc/exports
      line: '/srv/nfs/shared    192.168.10.0/24(rw)'
      state: present

  - name: Service NFS started
    ansible.builtin.systemd_service:
      name: nfs-server
      state: started
      enabled: true

  - name: NFS enabled in firewalld
    ansible.posix.firewalld:
      service: nfs
      state: enabled
      immediate: true
      permanent: true

